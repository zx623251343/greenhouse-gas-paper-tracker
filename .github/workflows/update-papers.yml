name: Update papers

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch papers from Semantic Scholar
        run: python update_papers.py

      - name: Commit updated papers
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update papers data"
          file_pattern: papers.json
